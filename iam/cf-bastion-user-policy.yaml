AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Least-privilege IAM managed policy for the DoggyApp bastion user.
  Covers every AWS API call made by setup.yaml and teardown.yaml, plus
  common kubectl/eksctl debug commands. All statements are scoped to
  doggy-app-eks-cluster-0 and its named supporting resources.
  Where AWS does not support resource-level restrictions (noted inline),
  the resource is set to "*" with an explanatory comment.

Parameters:
  BastionUserName:
    Type: String
    Description: Name of the existing IAM user whose access key lives on the bastion
    Default: doggy-app-bastion

Resources:

  DoggyAppBastionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: doggy-app-bastion-least-privilege
      Description: >
        Scoped to doggy-app-eks-cluster-0 and its named IAM roles, CloudFormation
        stacks, secrets, SNS topic, and ECR repositories. Covers full setup,
        teardown, and cluster debugging workflows.
      PolicyDocument:
        Version: '2012-10-17'
        Statement:

          # ── EKS ───────────────────────────────────────────────────────────────
          # Full management of doggy-app-eks-cluster-0 and its addons.
          # eks:ListClusters has no resource-level support in AWS — requires "*".
          - Sid: EKSClusterManagement
            Effect: Allow
            Action:
              - eks:DescribeCluster
              - eks:UpdateClusterConfig
              - eks:ListNodegroups
              - eks:DescribeNodegroup
              - eks:UpdateNodegroupConfig
              - eks:AccessKubernetesApi
            Resource:
              - arn:aws:eks:us-east-1:109798190983:cluster/doggy-app-eks-cluster-0

          - Sid: EKSAddonManagement
            Effect: Allow
            Action:
              - eks:CreateAddon
              - eks:DeleteAddon
              - eks:DescribeAddon
              - eks:UpdateAddon
              - eks:ListAddons
            Resource:
              - arn:aws:eks:us-east-1:109798190983:cluster/doggy-app-eks-cluster-0
              - arn:aws:eks:us-east-1:109798190983:addon/doggy-app-eks-cluster-0/*/*

          # AWS does not support resource-level restrictions for these list actions.
          - Sid: EKSListGlobal
            Effect: Allow
            Action:
              - eks:ListClusters
            Resource: '*'

          # ── CLOUDFORMATION ────────────────────────────────────────────────────
          # Scoped to the exact six stack names created by setup.yaml / teardown.yaml.
          # cloudformation:ListStacks and ValidateTemplate have no resource-level support.
          - Sid: CloudFormationDoggyStacks
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:GetTemplate
              - cloudformation:ListStackResources
              - cloudformation:CreateChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:DeleteChangeSet
            Resource:
              - arn:aws:cloudformation:us-east-1:109798190983:stack/cluster-autoscaler-iam-role/*
              - arn:aws:cloudformation:us-east-1:109798190983:stack/ebs-csi-driver-iam-role/*
              - arn:aws:cloudformation:us-east-1:109798190983:stack/alert-hook-iam-role/*
              - arn:aws:cloudformation:us-east-1:109798190983:stack/gitlab-runner-iam-role/*
              - arn:aws:cloudformation:us-east-1:109798190983:stack/sns-doggy/*
              - arn:aws:cloudformation:us-east-1:109798190983:stack/sns-and-secret-doggy/*

          # AWS does not support resource-level restrictions for these actions.
          - Sid: CloudFormationGlobal
            Effect: Allow
            Action:
              - cloudformation:ListStacks
              - cloudformation:ValidateTemplate
            Resource: '*'

          # ── IAM — OIDC PROVIDER ───────────────────────────────────────────────
          # Used by: eksctl utils associate-iam-oidc-provider
          # Scoped to the EKS OIDC issuer path for us-east-1.
          # iam:ListOpenIDConnectProviders has no resource-level support.
          - Sid: IAMOIDCProvider
            Effect: Allow
            Action:
              - iam:CreateOpenIDConnectProvider
              - iam:DeleteOpenIDConnectProvider
              - iam:GetOpenIDConnectProvider
              - iam:TagOpenIDConnectProvider
            Resource:
              - arn:aws:iam::109798190983:oidc-provider/oidc.eks.us-east-1.amazonaws.com/id/*

          - Sid: IAMOIDCList
            Effect: Allow
            Action:
              - iam:ListOpenIDConnectProviders
            Resource: '*'

          # ── IAM — SERVICE-ACCOUNT ROLES ───────────────────────────────────────
          # Scoped strictly to the four IRSA roles created by the CloudFormation stacks.
          # The bastion user cannot create any other IAM role.
          - Sid: IAMRolesCRUD
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:TagRole
              - iam:UntagRole
              - iam:UpdateRole
              - iam:UpdateAssumeRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:DetachRolePolicy
              - iam:PassRole
            Resource:
              - arn:aws:iam::109798190983:role/cluster-autoscaler-role-doggyapp-ka
              - arn:aws:iam::109798190983:role/ebs-csi-driver-role-doggyapp
              - arn:aws:iam::109798190983:role/doggy-alert-analyzer-role
              - arn:aws:iam::109798190983:role/gitlab-runner-ecr-role

          # AttachRolePolicy is split out so the Condition can enforce that the bastion
          # can ONLY attach the one AWS-managed policy actually needed (EBS CSI driver).
          # This prevents privilege escalation by attaching overpowered managed policies.
          - Sid: IAMAttachEBSCSIPolicyOnly
            Effect: Allow
            Action:
              - iam:AttachRolePolicy
            Resource:
              - arn:aws:iam::109798190983:role/ebs-csi-driver-role-doggyapp
            Condition:
              ArnEquals:
                'iam:PolicyARN': 'arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy'

          # Required when eks:CreateAddon creates EKS service-linked roles internally.
          # Condition restricts creation to EKS service namespaces only.
          - Sid: IAMServiceLinkedRoleEKS
            Effect: Allow
            Action:
              - iam:CreateServiceLinkedRole
            Resource: '*'
            Condition:
              StringLike:
                'iam:AWSServiceName':
                  - 'eks.amazonaws.com'
                  - 'eks-nodegroup.amazonaws.com'
                  - 'eks-fargate.amazonaws.com'

          # ── SECRETS MANAGER ───────────────────────────────────────────────────
          # Scoped to the exact secret name prefixes used by setup.yaml.
          # The random suffix (e.g. -oFvgSl) requires a wildcard at the end.
          # secretsmanager:ListSecrets has no resource-level support.
          - Sid: SecretsManagerDoggyApp
            Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:DeleteSecret
              - secretsmanager:DescribeSecret
              - secretsmanager:GetSecretValue
              - secretsmanager:PutSecretValue
              - secretsmanager:RestoreSecret
              - secretsmanager:TagResource
            Resource:
              - arn:aws:secretsmanager:us-east-1:109798190983:secret:openai-key-*
              - arn:aws:secretsmanager:us-east-1:109798190983:secret:doggy-db-pass-*
              - arn:aws:secretsmanager:us-east-1:109798190983:secret:gitlab-automation-token-*
              - arn:aws:secretsmanager:us-east-1:109798190983:secret:gitlab-agent-token-*
              - arn:aws:secretsmanager:us-east-1:109798190983:secret:gitlab-runner-token-*

          - Sid: SecretsManagerList
            Effect: Allow
            Action:
              - secretsmanager:ListSecrets
            Resource: '*'

          # ── SNS ───────────────────────────────────────────────────────────────
          # Scoped to the doggy-alerts topic only.
          # sns:ListTopics and ListSubscriptions have no resource-level support.
          - Sid: SNSDoggyAlerts
            Effect: Allow
            Action:
              - sns:CreateTopic
              - sns:DeleteTopic
              - sns:GetTopicAttributes
              - sns:SetTopicAttributes
              - sns:Subscribe
              - sns:Unsubscribe
              - sns:ListSubscriptionsByTopic
              - sns:Publish
            Resource:
              - arn:aws:sns:us-east-1:109798190983:doggy-alerts

          - Sid: SNSListGlobal
            Effect: Allow
            Action:
              - sns:ListTopics
              - sns:ListSubscriptions
            Resource: '*'

          # ── ECR ───────────────────────────────────────────────────────────────
          # Read-only on the bastion — the gitlab-runner-ecr-role IRSA handles push/pull.
          # ecr:GetAuthorizationToken has no resource-level support.
          - Sid: ECRDoggyAppRead
            Effect: Allow
            Action:
              - ecr:DescribeRepositories
              - ecr:ListImages
              - ecr:DescribeImages
              - ecr:GetRepositoryPolicy
              - ecr:BatchGetImage
              - ecr:GetDownloadUrlForLayer
            Resource:
              - arn:aws:ecr:us-east-1:109798190983:repository/doggyapp/*

          - Sid: ECRAuthTokenGlobal
            Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
            Resource: '*'

          # ── ELASTIC LOAD BALANCING ────────────────────────────────────────────
          # Read-only — used to fetch the ALB DNS name for GitLab ingress config.
          # ELBv2 Describe actions have no resource-level support in AWS.
          - Sid: ELBDescribeGlobal
            Effect: Allow
            Action:
              - elasticloadbalancing:DescribeLoadBalancers
              - elasticloadbalancing:DescribeTags
              - elasticloadbalancing:DescribeListeners
              - elasticloadbalancing:DescribeTargetGroups
            Resource: '*'

          # ── EC2 / AUTO SCALING ────────────────────────────────────────────────
          # Read-only for node debugging and autoscaler inspection.
          # EC2 and AutoScaling Describe actions have no resource-level support.
          - Sid: EC2AutoScalingDescribeGlobal
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcs
              - ec2:DescribeLaunchTemplates
              - ec2:DescribeLaunchTemplateVersions
              - autoscaling:DescribeAutoScalingGroups
              - autoscaling:DescribeAutoScalingInstances
              - autoscaling:DescribeScalingActivities
              - autoscaling:DescribeTags
            Resource: '*'

          # ── STS ───────────────────────────────────────────────────────────────
          # GetServiceBearerToken is called by kubectl when authenticating to EKS.
          # Condition restricts it to EKS service calls only.
          # GetCallerIdentity is useful for debugging identity issues and is harmless.
          - Sid: STSEKSAndDebug
            Effect: Allow
            Action:
              - sts:GetServiceBearerToken
            Resource: '*'
            Condition:
              StringEquals:
                'sts:AWSServiceName': 'eks.amazonaws.com'

          - Sid: STSCallerIdentity
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
            Resource: '*'

Outputs:
  PolicyArn:
    Description: >
      ARN of the least-privilege managed policy. After deploying this stack, attach
      it to the bastion user with the AttachCommand output below.
    Value: !Ref DoggyAppBastionPolicy
    Export:
      Name: DoggyAppBastionPolicyArn

  AttachCommand:
    Description: Run this command to attach the policy to the bastion IAM user
    Value: !Sub >-
      aws iam attach-user-policy
      --user-name ${BastionUserName}
      --policy-arn ${DoggyAppBastionPolicy}
