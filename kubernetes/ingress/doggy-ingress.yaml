apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: org-service-ingress
  namespace: default
  annotations:
    # Rewrites /api/org/login → /organization/login so Spring Boot's
    # @RequestMapping("/organization") controller receives the path it expects.
    # Note: the Angular service uses /api/org as the prefix (shorter),
    # but Spring Boot's controller is mapped to /organization.
    nginx.ingress.kubernetes.io/rewrite-target: /organization/$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    nginx.ingress.kubernetes.io/limit-rpm: "120"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/org(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: org-service
                port:
                  number: 8083
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    nginx.ingress.kubernetes.io/limit-rpm: "120"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/limit-exempt: "127.0.0.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      rewrite ^/(?!assets|favicon\.ico|.*\.(js|css|png|jpg|woff2?|ttf|svg))$ /index.html break;
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: doggy-webapp
                port:
                  number: 80