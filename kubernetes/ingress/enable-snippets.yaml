apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: controller
data:
  allow-snippet-annotations: "true"
  # Redirect HTTP → HTTPS. Works with NLB TLS termination because the NLB sets
  # X-Forwarded-Proto: https on port-443 traffic, so NGINX only redirects
  # requests that genuinely arrived on port 80.
  ssl-redirect: "true"
  use-forwarded-headers: "true"
  compute-full-forwarded-for: "true"