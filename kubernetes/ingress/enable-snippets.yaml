apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: controller
data:
  allow-snippet-annotations: "true"
  # NLB is a Layer 4 load balancer and does not set X-Forwarded-Proto, so
  # ssl-redirect would cause an infinite redirect loop. TLS is terminated at
  # the NLB using the ACM cert — the browser sees https:// without NGINX
  # needing to redirect.
  ssl-redirect: "false"
  use-forwarded-headers: "true"
  compute-full-forwarded-for: "true"