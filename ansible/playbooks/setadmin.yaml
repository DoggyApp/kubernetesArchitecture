---
- name: Grant doggy-admin SSO role EKS cluster access
  hosts: localhost
  connection: local
  gather_facts: False

  tasks:
    - name: Get doggy-admin caller ARN
      shell: aws sts get-caller-identity --profile doggy-admin --query Arn --output text
      register: doggy_caller_arn

    - name: Derive doggy-admin IAM role ARN
      set_fact:
        doggy_role_arn: >-
          {{ doggy_caller_arn.stdout
             | regex_replace('arn:aws:sts::([0-9]+):assumed-role/([^/]+)/.*',
                             'arn:aws:iam::\1:role/\2') }}

    - name: Check current cluster authentication mode
      shell: |
        env -u AWS_PROFILE \
          AWS_CONFIG_FILE=/dev/null \
          AWS_SHARED_CREDENTIALS_FILE=/dev/null \
          aws eks describe-cluster \
            --name doggy-app-eks-cluster-0 \
            --region us-east-1 \
            --query "cluster.accessConfig.authenticationMode" \
            --output text
      register: current_auth_mode

    - name: Enable API_AND_CONFIG_MAP authentication mode on cluster
      shell: |
        aws eks update-cluster-config \
          --name doggy-app-eks-cluster-0 \
          --region us-east-1 \
          --access-config authenticationMode=API_AND_CONFIG_MAP
      environment:
        AWS_PROFILE: doggy-admin
      when: current_auth_mode.stdout | trim != 'API_AND_CONFIG_MAP'

    - name: Wait for cluster to be ACTIVE
      shell: |
        env -u AWS_PROFILE \
          AWS_CONFIG_FILE=/dev/null \
          AWS_SHARED_CREDENTIALS_FILE=/dev/null \
          aws eks describe-cluster \
            --name doggy-app-eks-cluster-0 \
            --region us-east-1 \
            --query "cluster.status" \
            --output text
      register: cluster_status
      until: cluster_status.stdout | trim == "ACTIVE"
      retries: 20
      delay: 15

    - name: Update kubeconfig using instance profile
      shell: |
        env -u AWS_PROFILE \
          AWS_CONFIG_FILE=/dev/null \
          AWS_SHARED_CREDENTIALS_FILE=/dev/null \
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name doggy-app-eks-cluster-0

    - name: Write aws-auth patch script
      copy:
        dest: /tmp/patch-aws-auth.py
        content: |
          import subprocess, json, yaml, sys

          role_arn = sys.argv[1]

          result = subprocess.run(
              ['kubectl', 'get', 'configmap', 'aws-auth', '-n', 'kube-system', '-o', 'json'],
              capture_output=True, text=True
          )
          cm = json.loads(result.stdout)
          map_roles = yaml.safe_load(cm['data'].get('mapRoles', '') or '[]') or []

          if not any(r.get('rolearn') == role_arn for r in map_roles):
              map_roles.append({
                  'rolearn': role_arn,
                  'username': 'doggy-admin',
                  'groups': ['system:masters']
              })
              cm['data']['mapRoles'] = yaml.dump(map_roles, default_flow_style=False)

          apply = subprocess.run(
              ['kubectl', 'apply', '-f', '-'],
              input=json.dumps(cm),
              capture_output=True, text=True
          )
          print(apply.stdout)
          if apply.returncode != 0:
              print(apply.stderr, file=sys.stderr)
              sys.exit(apply.returncode)

    - name: Patch aws-auth ConfigMap to add doggy-admin
      shell: |
        env -u AWS_PROFILE \
          AWS_CONFIG_FILE=/dev/null \
          AWS_SHARED_CREDENTIALS_FILE=/dev/null \
          python3 /tmp/patch-aws-auth.py "{{ doggy_role_arn }}"

    - name: Update kubeconfig for doggy-admin
      shell: aws eks update-kubeconfig --region us-east-1 --name doggy-app-eks-cluster-0
      environment:
        AWS_PROFILE: doggy-admin

    - name: Confirm mapping
      debug:
        msg: "doggy-admin role '{{ doggy_role_arn }}' is now mapped to system:masters in aws-auth"
