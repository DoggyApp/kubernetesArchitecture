---
- name: Tear down the full Kubernetes stack on AWS using Ansible
  hosts: localhost
  connection: local
  gather_facts: False


  vars:
    cluster_name: "doggy-app-eks-cluster-0"
    nodegroup_name: "doggy-app-eks-ng-monitoring"
    region: "us-east-1"
    config_dir: "/home/ec2-user/config"
    arch_dir: "/home/ec2-user/kubernetesArchitecture/kubernetes"

    
  tasks:

    - name: Delete doggy ingress
      kubernetes.core.k8s:
        state: absent
        kind: Ingress
        namespace: default
        name: doggy-ingress
      ignore_errors: true

    - name: Uninstall ingress-nginx Helm release
      kubernetes.core.helm:
        name: ingress-nginx
        release_namespace: ingress-nginx
        state: absent
      ignore_errors: true  

    - name: Delete ingress-nginx namespace
      kubernetes.core.k8s:
        state: absent
        kind: Namespace
        name: ingress-nginx
      ignore_errors: true

    - name: Delete and wait for AWS Load Balancer to be fully deprovisioned
      shell: |
        ARNS=$(aws elbv2 describe-load-balancers --region {{ region }} \
          --query "LoadBalancers[*].LoadBalancerArn" --output text 2>/dev/null)
        if [ -z "$ARNS" ]; then
          echo "No load balancers found."
          exit 0
        fi
        CLUSTER_LBS=$(aws elbv2 describe-tags \
          --resource-arns $ARNS \
          --region {{ region }} \
          --query "TagDescriptions[?Tags[?Key=='kubernetes.io/cluster/{{ cluster_name }}']].ResourceArn" \
          --output text 2>/dev/null)
        if [ -z "$CLUSTER_LBS" ]; then
          echo "No load balancers found for cluster {{ cluster_name }}."
          exit 0
        fi
        for ARN in $CLUSTER_LBS; do
          echo "Deleting load balancer: $ARN"
          aws elbv2 delete-load-balancer --load-balancer-arn "$ARN" --region {{ region }}
        done
        echo "Waiting for deletion to complete..."
        for i in $(seq 1 24); do
          REMAINING=$(aws elbv2 describe-tags \
            --resource-arns $CLUSTER_LBS \
            --region {{ region }} \
            --query "TagDescriptions[?Tags[?Key=='kubernetes.io/cluster/{{ cluster_name }}']].ResourceArn" \
            --output text 2>/dev/null)
          if [ -z "$REMAINING" ]; then
            echo "Load balancer fully deleted."
            exit 0
          fi
          echo "Still deleting... attempt $i/24"
          sleep 10
        done
        echo "WARNING: Timed out waiting for load balancer deletion. Proceeding anyway."
      environment:
        AWS_DEFAULT_REGION: "{{ region }}"
      ignore_errors: true

    - name: Uninstall Promtail stack
      kubernetes.core.helm:
        name: promtail
        release_namespace: monitoring
        state: absent

    - name: Uninstall Loki stack
      kubernetes.core.helm:
        name: loki
        release_namespace: monitoring
        state: absent

    - name: Uninstall Prometheus stack
      kubernetes.core.helm:
        name: kube-prometheus-stack
        release_namespace: monitoring
        state: absent

    - name: Uninstall cluster autoscaler
      kubernetes.core.helm:
        name: cluster-autoscaler
        release_namespace: kube-system
        state: absent

    - name: Uninstall agentk Helm release
      kubernetes.core.helm:
        name: doggy-agent
        release_namespace: gitlab
        state: absent
      ignore_errors: true

    - name: Uninstall GitLab Runner Helm release
      kubernetes.core.helm:
        name: gitlab-runner
        release_namespace: gitlab
        state: absent
      ignore_errors: true

    - name: Delete gitlab namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: gitlab
        state: absent
      ignore_errors: true

    - name: Delete GitLab runner IAM role CloudFormation stack
      amazon.aws.cloudformation:
        stack_name: gitlab-runner-iam-role
        state: absent

    - name: Delete gitlab-automation-token from Secrets Manager
      shell: aws secretsmanager delete-secret --secret-id gitlab-automation-token --force-delete-without-recovery
      environment:
        AWS_REGION: "{{ region }}"
      ignore_errors: true

    - name: Delete gitlab-agent-token from Secrets Manager
      shell: aws secretsmanager delete-secret --secret-id gitlab-agent-token --force-delete-without-recovery
      environment:
        AWS_REGION: "{{ region }}"
      ignore_errors: true

    - name: Delete gitlab-runner-token from Secrets Manager
      shell: aws secretsmanager delete-secret --secret-id gitlab-runner-token --force-delete-without-recovery
      environment:
        AWS_REGION: "{{ region }}"
      ignore_errors: true

    - name: Return SNS ARN
      shell: |
        aws cloudformation describe-stacks --stack-name sns-doggy --query "Stacks[0].Outputs[?OutputKey=='SNSTopicArn'].OutputValue" --output text
      register: sns_topic_arn

    - name: Unsubscribe all SNS subscriptions for the topic
      shell: |
        for arn in $(aws sns list-subscriptions-by-topic \
                       --topic-arn "{{ sns_topic_arn.stdout }}" \
                       --query 'Subscriptions[?SubscriptionArn!=`PendingConfirmation`].SubscriptionArn' \
                       --output text); do
          aws sns unsubscribe --subscription-arn "$arn"
        done
      environment:
        AWS_REGION: us-east-1


    - name: Delete SNS CloudFormation stack
      amazon.aws.cloudformation:
        stack_name: sns-doggy
        state: absent

    - name: Delete autoscaler role CloudFormation stack
      amazon.aws.cloudformation:
        stack_name: cluster-autoscaler-iam-role
        state: absent

    - name: Delete Loki alert rules
      shell: kubectl delete -f "{{ arch_dir }}/monitoring/loki/loki-alert-rules.yaml" -n monitoring
      ignore_errors: true

    - name: Delete alert hook IAM role CloudFormation stack
      amazon.aws.cloudformation:
        stack_name: alert-hook-iam-role
        state: absent

    - name: Delete web app pods
      kubernetes.core.k8s:
        state: absent
        src: "{{ arch_dir }}/default/pods.yaml"

    - name: Delete web app services
      kubernetes.core.k8s:
        state: absent
        src: "{{ arch_dir }}/default/services.yaml"

    - name: Delete monitoring namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: monitoring
        state: absent

    - name: Delete config directory
      become: true
      file:
        path: "/home/ec2-user/config"
        state: absent

...