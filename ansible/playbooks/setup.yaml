---
- name: Install and configure GitLab 
  hosts: localhost
  connection: local
  gather_facts: False
  vars_prompt:
  - name: aws_id
    prompt: "We need your AWS ID to set up the pipeline, it won't go anywhere"
    private: False
    default: "109798190983"


  tasks:
#############################################################
################### Install GitLabCE ########################
    - name: Query GitLab ALB DNS from AWS
      shell: |
        aws elbv2 describe-load-balancers \
          --names doggy-gitlab-alb \
          --query "LoadBalancers[0].DNSName" \
          --output text
      register: gitlab_alb_dns

    - name: Set gitlab_alb_url fact
      set_fact:
        gitlab_alb_url: "{{ gitlab_alb_dns.stdout | trim }}"

    - name: Install and configure GitLab CE
      block:

        # GitLab CE requires the official package repository to be added first.
        # This script downloads and installs the gitlab-ce apt/yum repo.
        # For ARM64 (Graviton), GitLab CE supports aarch64 from v15+.
        - name: Add GitLab CE package repository
          shell: |
            curl -sS https://packages.gitlab.com/install/repositories/gitlab/gitlab-ce/script.rpm.sh \
              | sudo bash
          args:
            creates: /etc/yum.repos.d/gitlab_gitlab-ce.repo

        # Install GitLab CE with the external URL set to the ALB DNS name.
        # GITLAB_ALB_URL must be passed as an extra var from the EC2 UserData
        # (add it to the ansible-playbook command alongside email/aws_id).
        # The EXTERNAL_URL tells GitLab what hostname to use for git clone URLs,
        # web hooks, and the GitLab KAS WebSocket endpoint.
        - name: Install GitLab CE
          shell: |
            EXTERNAL_URL="http://{{ gitlab_alb_url }}" \
            sudo yum install -y gitlab-ce
          environment:
            EXTERNAL_URL: "http://{{ gitlab_alb_url }}"
          args:
            creates: /etc/gitlab/gitlab.rb

        # gitlab-ctl reconfigure reads /etc/gitlab/gitlab.rb and applies the config.
        # It takes 2-5 minutes — this is normal.
        - name: Reconfigure GitLab
          shell: sudo gitlab-ctl reconfigure
          async: 600
          poll: 10

        - name: Read GitLab initial root password
          shell: sudo grep 'Password:' /etc/gitlab/initial_root_password | awk '{print $2}'
          register: gitlab_initial_password_raw

        - name: Set GitLab temp password fact
          set_fact:
            gitlab_temp_password: "{{ gitlab_initial_password_raw.stdout | trim }}"

#########################################################################
############# Create GitLabAutomation ########################
        - name: Check if automation token already stored in Secrets Manager
          shell: |
            aws secretsmanager describe-secret \
              --secret-id gitlab-automation-token-1 \
              --region us-east-1 > /dev/null 2>&1 \
            && echo "exists" || echo "missing"
          register: automation_secret_check

        - name: Create GitLab automation token via Rails console
          shell: |
            sudo gitlab-rails runner "
              user = User.find_by_username('root')
              token = user.personal_access_tokens.create!(
                name: 'ansible-automation',
                scopes: ['api', 'read_repository', 'write_repository'],
                expires_at: 1.year.from_now
              )
              puts token.token
            "
          register: gitlab_automation_token
          when: automation_secret_check.stdout | trim == "missing"

        - name: Store automation token in Secrets Manager
          shell: |
            aws secretsmanager create-secret \
              --name gitlab-automation-token-1 \
              --description "GitLab Ansible automation token" \
              --secret-string "{{ gitlab_automation_token.stdout | trim }}" \
              --region us-east-1
          when: automation_secret_check.stdout | trim == "missing"

        - name: Fetch existing automation token from Secrets Manager
          shell: |
            aws secretsmanager get-secret-value \
              --secret-id gitlab-automation-token-1 \
              --region us-east-1 \
              --query SecretString \
              --output text
          register: gitlab_automation_token_existing
          when: automation_secret_check.stdout | trim == "exists"

        - name: Confirm automation token stored
          debug:
            msg: "GitLab automation token created and saved to Secrets Manager as 'gitlab-automation-token-1'"

        - name: Set GitLab token fact (new token)
          set_fact:
            gl_token: "{{ gitlab_automation_token.stdout | trim }}"
            gl_url: "http://localhost"
          when: automation_secret_check.stdout | trim == "missing"

        - name: Set GitLab token fact (existing token)
          set_fact:
            gl_token: "{{ gitlab_automation_token_existing.stdout | trim }}"
            gl_url: "http://localhost"
          when: automation_secret_check.stdout | trim == "exists"

        - name: Wait for GitLab to be ready
          shell: |
            for i in $(seq 1 30); do
              echo ""
              echo "=== Attempt $i/30 (checking localhost/-/readiness) ==="

              CTL_STATUS=$(sudo gitlab-ctl status 2>&1)
              echo "$CTL_STATUS"

              # Only check for crashes after attempt 3 (allow 30s for services to start)
              if [ "$i" -gt 3 ]; then
                CRASHED=$(echo "$CTL_STATUS" | grep "^down:" || true)
                if [ -n "$CRASHED" ]; then
                  echo ""
                  echo "FATAL: services are down after startup window:"
                  echo "$CRASHED"
                  echo ""
                  echo "--- reading crash logs ---"
                  echo "$CRASHED" | while IFS= read -r line; do
                    SERVICE=$(echo "$line" | sed 's/^down: \([^:]*\):.*/\1/')
                    echo "=== /var/log/gitlab/$SERVICE/current (last 20 lines) ==="
                    sudo tail -n 20 "/var/log/gitlab/$SERVICE/current" 2>/dev/null || echo "(no log found)"
                  done
                  exit 2
                fi
              fi

              STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 5 "http://localhost/-/readiness" || echo "000")
              echo "HTTP status: $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "GitLab is ready!"
                exit 0
              fi

              sleep 10
            done
            echo "GitLab did not become ready after 30 attempts"
            exit 1
          register: gitlab_ready_result

        - name: Create doggyapp GitLab group
          community.general.gitlab_group:
            api_url: "{{ gl_url }}"
            api_token: "{{ gl_token }}"
            name: doggyapp
            path: doggyapp
            visibility: private
            state: present

        - name: Create GitLab projects for each service
          community.general.gitlab_project:
            api_url: "{{ gl_url }}"
            api_token: "{{ gl_token }}"
            name: "{{ item.name }}"
            path: "{{ item.path }}"
            group: doggyapp
            visibility: private
            initialize_with_readme: false
            state: present
          loop:
            - { name: "Frontend", path: "frontend" }
            - { name: "OwnerService", path: "owner-service" }
            - { name: "UserService", path: "user-service" }
            - { name: "OrganizationService", path: "org-service" }

        - name: Create pipeline-config project
          community.general.gitlab_project:
            api_url: "{{ gl_url }}"
            api_token: "{{ gl_token }}"
            name: pipeline-config
            path: pipeline-config
            group: doggyapp
            visibility: private
            initialize_with_readme: true
            state: present
          register: gl_pipeline_config_project

        - name: Push agent config.yaml to pipeline-config project
          uri:
            url: "{{ gl_url }}/api/v4/projects/{{ gl_pipeline_config_project.project.id }}/repository/files/.gitlab%2Fagents%2Fdoggy-agent%2Fconfig.yaml"
            method: POST
            headers:
              PRIVATE-TOKEN: "{{ gl_token }}"
              Content-Type: application/json
            body_format: json
            body:
              branch: main
              content: "{{ lookup('file', '/home/ec2-user/kubernetesArchitecture/gitlab/pipeline-config/.gitlab/agents/doggy-agent/config.yaml') }}"
              commit_message: Add doggy-agent config
            status_code: [200, 201, 400]

#########################################################################
############# Create AgentK ########################
        - name: List existing cluster agents
          uri:
            url: "{{ gl_url }}/api/v4/projects/{{ gl_pipeline_config_project.project.id }}/cluster_agents"
            method: GET
            headers:
              PRIVATE-TOKEN: "{{ gl_token }}"
          register: gl_existing_agents

        - name: Register doggy-agent if not already registered
          uri:
            url: "{{ gl_url }}/api/v4/projects/{{ gl_pipeline_config_project.project.id }}/cluster_agents"
            method: POST
            headers:
              PRIVATE-TOKEN: "{{ gl_token }}"
              Content-Type: application/json
            body_format: json
            body:
              name: doggy-agent
            status_code: [200, 201]
          register: gl_new_agent
          when: gl_existing_agents.json | selectattr('name', 'equalto', 'doggy-agent') | list | length == 0

        - name: Set agent ID fact
          set_fact:
            gl_agent_id: >-
              {{ (gl_existing_agents.json | selectattr('name', 'equalto', 'doggy-agent') | first).id
                 if (gl_existing_agents.json | selectattr('name', 'equalto', 'doggy-agent') | list | length > 0)
                 else gl_new_agent.json.id }}

        - name: Check if agent token already stored in Secrets Manager
          shell: |
            aws secretsmanager describe-secret \
              --secret-id gitlab-agent-token \
              --region us-east-1 > /dev/null 2>&1 \
            && echo "exists" || echo "missing"
          register: agent_secret_check

        - name: Create agent token
          uri:
            url: "{{ gl_url }}/api/v4/projects/{{ gl_pipeline_config_project.project.id }}/cluster_agents/{{ gl_agent_id }}/tokens"
            method: POST
            headers:
              PRIVATE-TOKEN: "{{ gl_token }}"
              Content-Type: application/json
            body_format: json
            body:
              name: doggy-agent-token
            status_code: [200, 201]
          register: gl_agent_token_resp
          when: agent_secret_check.stdout | trim == "missing"

        - name: Store agent token in Secrets Manager
          shell: |
            aws secretsmanager create-secret \
              --name gitlab-agent-token \
              --description "GitLab Kubernetes agent token for doggy-agent" \
              --secret-string "{{ gl_agent_token_resp.json.token }}" \
              --region us-east-1
          when: agent_secret_check.stdout | trim == "missing"

        - name: Fetch existing agent token from Secrets Manager
          shell: |
            aws secretsmanager get-secret-value \
              --secret-id gitlab-agent-token \
              --region us-east-1 \
              --query SecretString \
              --output text
          register: gl_agent_token_existing
          when: agent_secret_check.stdout | trim == "exists"

        - name: Set agent token fact (new token)
          set_fact:
            gl_agent_token: "{{ gl_agent_token_resp.json.token }}"
          when: agent_secret_check.stdout | trim == "missing"

        - name: Set agent token fact (existing token)
          set_fact:
            gl_agent_token: "{{ gl_agent_token_existing.stdout | trim }}"
          when: agent_secret_check.stdout | trim == "exists"

        - name: Confirm agent registered
          debug:
            msg: "GitLab agent 'doggy-agent' registered (ID: {{ gl_agent_id }}) and token stored in Secrets Manager as 'gitlab-agent-token'"

#########################################################################
############# Create Runner ########################
        # Check Secrets Manager first — the runner token is only visible at creation
        # time, so on re-runs we load the previously stored value instead of
        # registering a duplicate runner.
        - name: Check if runner token already stored in Secrets Manager
          shell: |
            aws secretsmanager describe-secret \
              --secret-id gitlab-runner-token \
              --region us-east-1 > /dev/null 2>&1 \
            && echo "exists" || echo "missing"
          register: runner_secret_check

        - name: Get doggyapp group ID
          uri:
            url: "{{ gl_url }}/api/v4/groups/doggyapp"
            method: GET
            headers:
              PRIVATE-TOKEN: "{{ gl_token }}"
          register: gl_group_info
          when: runner_secret_check.stdout | trim == "missing"

        - name: Create GitLab Runner for EKS
          uri:
            url: "{{ gl_url }}/api/v4/user/runners"
            method: POST
            headers:
              PRIVATE-TOKEN: "{{ gl_token }}"
              Content-Type: application/json
            body_format: json
            body:
              runner_type: group_type
              group_id: "{{ gl_group_info.json.id }}"
              description: doggy-eks-runner
              tag_list: "k8s"
              run_untagged: false
            status_code: [200, 201]
          register: gl_runner
          when: runner_secret_check.stdout | trim == "missing"

        - name: Store runner token in Secrets Manager
          shell: |
            aws secretsmanager create-secret \
              --name gitlab-runner-token \
              --description "GitLab Runner token for doggy-eks-runner" \
              --secret-string "{{ gl_runner.json.token }}" \
              --region us-east-1
          when: runner_secret_check.stdout | trim == "missing"

        - name: Load runner token from Secrets Manager
          shell: |
            aws secretsmanager get-secret-value \
              --secret-id gitlab-runner-token \
              --query SecretString \
              --output text \
              --region us-east-1
          register: gl_runner_token_raw

        - name: Set runner token fact
          set_fact:
            gl_runner_token: "{{ gl_runner_token_raw.stdout | trim }}"

        - name: Confirm runner created
          debug:
            msg: "GitLab Runner 'doggy-eks-runner' ready and token loaded from Secrets Manager"

        - name: Set group CI/CD variables
          community.general.gitlab_group_variable:
            api_url: "{{ gl_url }}"
            api_token: "{{ gl_token }}"
            group: doggyapp
            purge: false
            variables:
              - name: AWS_ACCOUNT_ID
                value: "109798190983"
                protected: true
                masked: false
              - name: AWS_REGION
                value: "us-east-1"
                protected: true
                masked: false
              - name: ECR_REGISTRY
                value: "109798190983.dkr.ecr.us-east-1.amazonaws.com"
                protected: true
                masked: false
              - name: CLUSTER_NAME
                value: "doggy-app-eks-cluster-0"
                protected: true
                masked: false

##########################################################
########### INSTALL GITLAB PIPELINE COMPONENTS ##########

    - name: Install GitLab pipeline components
      block:
        - name: Get OIDC URL for runner role trust policy
          shell: |
            aws eks describe-cluster \
              --name doggy-app-eks-cluster-0 \
              --query "cluster.identity.oidc.issuer" \
              --output text | sed 's|https://||'
          register: runner_oidc_url

        - name: Deploy GitLab runner IAM role
          amazon.aws.cloudformation:
            stack_name: gitlab-runner-iam-role
            template_body: "{{ lookup('file', '/home/ec2-user/kubernetesArchitecture/gitlab/runner/runner-role.yaml') }}"
            template_parameters:
              AwsAccountId: "{{ aws_id }}"
              OidcUrl: "{{ runner_oidc_url.stdout | trim }}"
            state: present
            capabilities:
              - CAPABILITY_NAMED_IAM

        - name: Get runner role ARN
          shell: |
            aws cloudformation describe-stacks \
              --stack-name gitlab-runner-iam-role \
              --query "Stacks[0].Outputs[?OutputKey=='GitLabRunnerRoleArn'].OutputValue" \
              --output text
          register: runner_role_arn

        - name: Create gitlab namespace
          kubernetes.core.k8s:
            name: gitlab
            api_version: v1
            kind: Namespace
            state: present

        - name: Install Helm
          shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

        - name: Add GitLab Helm repo
          kubernetes.core.helm_repository:
            name: gitlab
            repo_url: https://charts.gitlab.io

        - name: Install agentk via Helm
          kubernetes.core.helm:
            name: doggy-agent
            chart_ref: gitlab/gitlab-agent
            release_namespace: gitlab
            values:
              config:
                token: "{{ gl_agent_token }}"
                kasAddress: "ws://{{ gitlab_alb_url }}/-/kubernetes-agent/"
            state: present

        - name: Install GitLab Runner via Helm
          kubernetes.core.helm:
            name: gitlab-runner
            chart_ref: gitlab/gitlab-runner
            release_namespace: gitlab
            values:
              gitlabUrl: "http://{{ gitlab_alb_url }}"
              runnerToken: "{{ gl_runner_token }}"
              rbac:
                create: true
              serviceAccount:
                annotations:
                  eks.amazonaws.com/role-arn: "{{ runner_role_arn.stdout | trim }}"
              runners:
                privileged: true
                tags: "k8s"
            state: present

#######################################################################
################### Kubernetes Setup ####################################
#######################################################################

- name: Deploy full Kubernetes stack to AWS using Ansible
  hosts: localhost
  connection: local
  gather_facts: False
  vars_prompt:
    - name: email
      prompt: "We need your email to set up the SNS service, it won't go anywhere"
      private: False
      default: "idanzigm@gmail.com"
    - name: aws_id
      prompt: "We also need your AWS ID to set up everything, it won't go anywhere"
      private: False
      default: "109798190983"
    - name: openai_secret_arn
      prompt: "Enter the ARN for your secret containing your open AI API key (you need to purchase credits on OpenAI for the integration to work, 2$ is more than enough for a demo)"
      private: False
      default: "arn:aws:secretsmanager:us-east-1:109798190983:secret:openai-key-oFvgSl"
    - name: postgres_secret_arn
      prompt: "Enter the ARN for your secret containing the Postgres password"
      private: False
      default: "arn:aws:secretsmanager:us-east-1:109798190983:secret:doggy-db-pass-kJ8xcp"
  vars:
    cluster_name: "doggy-app-eks-cluster-0"
    nodegroup_name: "doggy-app-eks-ng-monitoring"
    region: "us-east-1"
    config_dir: "/home/ec2-user/config"
    arch_dir: "/home/ec2-user/kubernetesArchitecture/kubernetes"


#######################################################################
  tasks:

    - name: set up environment 
      block: 
        - name: Ensure /home/ec2-user/config directory exists
          file:
            path: "/home/ec2-user/config"
            state: directory
            mode: '0755'

# this should be done with AWS Module 
        - name: Update kubeconfig
          shell: aws eks update-kubeconfig --region {{ region }} --name {{ cluster_name }} --profile eks-cluster-admin

# is there an eks module 
        - name: Associate IAM OIDC provider
          shell: eksctl utils associate-iam-oidc-provider --cluster {{ cluster_name }} --approve

#AWS Module 
        - name: Get OIDC URL
          shell: |
            aws eks describe-cluster \
              --name {{ cluster_name }} \
              --query "cluster.identity.oidc.issuer" \
              --output text | sed 's|https://||'
          register: oidc_url

        - name: Create ingress namespace
          kubernetes.core.k8s:
            name: ingress-nginx
            api_version: v1
            kind: Namespace
            state: present

        - name: Create monitoring namespace
          kubernetes.core.k8s:
            name: monitoring
            api_version: v1
            kind: Namespace
            state: present

        - name: Apply ingress 
          shell: kubectl apply -k "{{ arch_dir }}/ingress/"
          # async: 300 
          # poll: 0 
          register: deploying_ingress 
          retries: 5
          delay: 10
          until: deploying_ingress.rc == 0


#########################################################################
############# Template CloudFormation First Batch ########################

    - name: Create the CloudFormation templates 
      block: 
        - name: Render the autoscaler role YAML
          shell: |
            envsubst < "{{ arch_dir }}/autoscaler/cf-autoscaler-role.yaml" > "{{ config_dir }}/cf-autoscaler-role-up.yaml"
          environment:
            OIDC_URL: "{{ oidc_url.stdout }}"
            AWS_ID: "{{ aws_id }}"

        - name: Render the SNS stack yaml 
          shell: |
            envsubst < "{{ arch_dir }}/monitoring/alerting/cf-sns.yaml" > "{{ config_dir }}/cf-sns-up.yaml"
          environment: 
            EMAIL: "{{ email }}"




#########################################################################
############# Deploy CloudFormation First Batch ########################

    - name: Deploy the Autoscaler role and SNS 
      block: 

        - name: Deploy autoscaler role with CloudFormation
          amazon.aws.cloudformation:
            stack_name: cluster-autoscaler-iam-role
            template_body: "{{ lookup('file', config_dir + '/cf-autoscaler-role-up.yaml') }}"
            state: present
            capabilities:
              - CAPABILITY_NAMED_IAM
          register: deploying_autoscaler_stack
          async: 300 
          poll: 0 

        - name: Set autoscaler stack job ID if async used
          set_fact:
            autoscaler_stack_job_id: "{{ deploying_autoscaler_stack.ansible_job_id | default('') }}"


# Use AWS Module 
        - name: Deploy SNS 
          amazon.aws.cloudformation:
            stack_name: sns-doggy
            template_body: "{{ lookup('file', config_dir + '/cf-sns-up.yaml') }}"
            state: present
          register: deploying_sns_stack
          async: 300 
          poll: 0 

        - name: Set SNS stack job ID if async used
          set_fact:
            sns_stack_job_id: "{{ deploying_sns_stack.ansible_job_id | default('') }}"


##########################################################
########### INSTALL REPOSITORIES ########################


    - name: Install Repos 
      block: 
        - name: Add autoscaler Helm repo
          kubernetes.core.helm_repository:
            name: autoscaler
            repo_url: https://kubernetes.github.io/autoscaler
          register: installing_autoscaler_repo

# Do i need helm_repository to do this? 
        - name: Add Prometheus Helm repo
          kubernetes.core.helm_repository:
            name: prometheus-community
            repo_url: https://prometheus-community.github.io/helm-charts
          register: installing_prometheus_repo

# do i need helm_repository to do this 
        - name: Add Grafana Helm repo
          kubernetes.core.helm_repository:
            name: grafana
            repo_url: https://grafana.github.io/helm-charts
          register: installing_grafana_repo


###############################################################
############### INSTALL STACK ################################

    - name: Deploy Repos 
      block: 

        - name: Deploy Prometheus stack
          kubernetes.core.helm:
            name: kube-prometheus-stack
            chart_ref: prometheus-community/kube-prometheus-stack
            release_namespace: monitoring
            create_namespace: true
            values_files:
              - "{{ arch_dir }}/monitoring/prometheus/prometheus-values.yaml"
          register: deploying_prometheus 


        - name: deploying Loki stack
          kubernetes.core.helm:
            name: loki
            chart_ref: grafana/loki
            release_namespace: monitoring
            create_namespace: true
            values_files:
              - "{{ arch_dir }}/monitoring/loki/loki-values.yaml"
          register: deploying_loki

        - name: Deploying Promtail stack
          kubernetes.core.helm:
            name: promtail
            chart_ref: grafana/promtail
            release_namespace: monitoring
            create_namespace: true
            values_files:
              - "{{ arch_dir }}/monitoring/promtail/promtail-values.yaml"
          register: deploying_promtail



############## WAIT #########################################

    - name: Wait for deployment 
      block:

        - name: Wait for autoscaler role to deploy
          async_status:
            jid: "{{ autoscaler_stack_job_id }}"
          register: deploying_autoscaler_stack_status
          until: deploying_autoscaler_stack_status.finished
          retries: 60
          delay: 5 
          when: autoscaler_stack_job_id != ''

        - name: Wait for sns to deploy ######
          async_status:
            jid: "{{ sns_stack_job_id }}"
          register: deploying_sns_stack_status
          until: deploying_sns_stack_status.finished
          retries: 60
          delay: 5
          when: sns_stack_job_id != ''


#########################################################################
############# Template CloudFormation Second Batch ########################

    - name: Create the second batch of templates 
      block: 

        - name: Get autoscaler role ARN
          shell: |
            aws cloudformation describe-stacks \
              --stack-name cluster-autoscaler-iam-role \
              --query "Stacks[0].Outputs[?OutputKey=='ClusterAutoscalerRoleArn'].OutputValue" \
              --output text
          register: autoscaler_role_arn

        - name: Template the autoscaler values
          template:
            src: "{{ arch_dir }}/autoscaler/autoscaler-values.yaml.j2"
            dest: "{{ config_dir }}/autoscaler-values-up.yaml"
          register: autoscaler_template


        - name: Return SNS ARN 
          shell: |
            aws cloudformation describe-stacks --stack-name sns-doggy --query "Stacks[0].Outputs[?OutputKey=='SNSTopicArn'].OutputValue" --output text
          register: sns_topic_arn

        - name: Subscribe email to SNS topic if not already subscribed
          shell: |
            EXISTING_SUBS=$(aws sns list-subscriptions-by-topic --topic-arn "{{ sns_topic_arn.stdout }}" | grep -c "{{ email }}")
            if [ "$EXISTING_SUBS" -eq 0 ]; then
              aws sns subscribe \
                --topic-arn "{{ sns_topic_arn.stdout }}" \
                --protocol email \
                --notification-endpoint "{{ email }}"
            fi
          environment:
            AWS_REGION: us-east-1

        - name: Render alert hook role yaml 
          shell: |
            envsubst < "{{ arch_dir }}/monitoring/alerting/cf-alert-hook-role.yaml" > "{{ config_dir }}/cf-alert-hook-role-up.yaml"
          environment: 
            AWS_ID: "{{ aws_id }}"
            OIDC_URL: "{{ oidc_url.stdout }}"
            OPENAI_SECRET_ARN: "{{ openai_secret_arn }}"
            SNS_TOPIC_ARN: "{{ sns_topic_arn.stdout }}"

#########################################################################
############# Deploy Second Batch ########################

    - name: Deploy the autoscaler and the alert-role
      block:  

        - name: Install cluster autoscaler via Helm
          kubernetes.core.helm:
            name: cluster-autoscaler
            chart_ref: autoscaler/cluster-autoscaler
            release_namespace: kube-system
            create_namespace: true
            values_files:
              - "{{ config_dir }}/autoscaler-values-up.yaml"
            state: present

        - name:  Deploy alert hook IAM role
          amazon.aws.cloudformation:
            stack_name: alert-hook-iam-role
            template_body: "{{ lookup('file', config_dir + '/cf-alert-hook-role-up.yaml') }}"
            state: present
            capabilities:
              - CAPABILITY_NAMED_IAM
          register: deploying_alert_stack


    - name: Deploy the alert hook
      block:  
        - name: Apply Loki alert rules
          shell: kubectl apply -f "{{ arch_dir }}/monitoring/loki/loki-alert-rules.yaml" -n monitoring

        - name: Get alert hook role ARN
          shell: |
            aws cloudformation describe-stacks \
              --stack-name alert-hook-iam-role \
              --query "Stacks[0].Outputs[?OutputKey=='ClusterAlerterRoleArn'].OutputValue" \
              --output text
          register: alerter_role_arn

        - name: Render alert service account
          template:
            src: "{{ arch_dir }}/monitoring/alerting/alert-service-account.yaml.j2"
            dest: "{{ config_dir }}/alert-service-account-up.yaml"

        - name: Apply alert service account
          kubernetes.core.k8s:
            state: present
            src: "{{ config_dir }}/alert-service-account-up.yaml"
            apply: True 

        - name: Render alert pod config 
          template:
            src: "{{ arch_dir }}/monitoring/alerting/alert-pod.yaml.j2"
            dest: "{{ config_dir }}/alert-pod-up.yaml"


 #################################################################
 ######################### POSTGRES SECRET ##################################

    - name: Create Postgres Kubernetes secret from AWS Secrets Manager
      block:
        - name: Fetch postgres password from Secrets Manager
          shell: |
            aws secretsmanager get-secret-value \
              --secret-id "{{ postgres_secret_arn }}" \
              --query SecretString \
              --output text | python3 -c "import sys,json; print(list(json.load(sys.stdin).values())[0])"
          register: postgres_password

        - name: Apply postgres secret to cluster
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: postgres-secret
                namespace: default
              type: Opaque
              stringData:
                POSTGRES_DB: doggyapp
                POSTGRES_USER: doggyapp
                POSTGRES_PASSWORD: "{{ postgres_password.stdout }}"
                DB_URL: jdbc:postgresql://postgres-service:5432/doggyapp

 #################################################################
 ######################### DEPLOY PODS ##################################

    - name: Deploy alerter pod
      block:
        - name: Wait for ingress to become available
          kubernetes.core.k8s_info:
            api_version: networking.k8s.io/v1
            kind: Ingress
            namespace: default
            name: doggy-ingress
          register: ingress_status
          until: ingress_status.resources | length > 0
          retries: 30
          delay: 5

        - name: Get LoadBalancer hostname
          shell: |
            kubectl get ingress doggy-ingress -n default -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
          register: lb_host

        - name: Create alerter config map
          shell: |
            kubectl create configmap alerter-config \
              --from-literal=LOAD_BALANCER_URL=http://{{ lb_host.stdout }} \
              --namespace=monitoring \
              --dry-run=client -o yaml | kubectl apply -f -

        - name: Create webhook
          kubernetes.core.k8s:
            state: present
            src: "{{ config_dir }}/alert-pod-up.yaml"
            apply: True

    - name: Write environment info file to bastion home directory
      block:
        - name: Get Grafana admin password
          shell: |
            kubectl get secret kube-prometheus-stack-grafana \
              -n monitoring \
              -o jsonpath="{.data.admin-password}" | base64 --decode
          register: grafana_password_raw

        - name: Write environment info file
          copy:
            dest: /home/ec2-user/environment-info.txt
            content: |
              gitlab temp password : {{ gitlab_temp_password }}
              gitlab URL : http://{{ gitlab_alb_url }}
              Web app URL : http://{{ lb_host.stdout }}
              Grafana User name : admin
              Grafana Password : {{ grafana_password_raw.stdout }}
            mode: '0600'
...
