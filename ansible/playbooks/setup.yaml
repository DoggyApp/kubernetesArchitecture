

#######################################################################
################### Kubernetes Setup ####################################
#######################################################################

- name: Deploy full Kubernetes stack to AWS using Ansible
  hosts: localhost
  connection: local
  gather_facts: False
  environment:
    AWS_PROFILE: doggy-admin
  vars_prompt:
    - name: email
      prompt: "We need your email to set up the SNS service, it won't go anywhere"
      private: False
      default: "idanzigm@gmail.com"
    - name: aws_id
      prompt: "We also need your AWS ID to set up everything, it won't go anywhere"
      private: False
      default: "109798190983"
    - name: openai_secret_arn
      prompt: "Enter the ARN for your secret containing your open AI API key (you need to purchase credits on OpenAI for the integration to work, 2$ is more than enough for a demo)"
      private: False
      default: "arn:aws:secretsmanager:us-east-1:109798190983:secret:openai-key-oFvgSl"
    - name: postgres_secret_arn
      prompt: "Enter the ARN for your secret containing the Postgres password"
      private: False
      default: "arn:aws:secretsmanager:us-east-1:109798190983:secret:doggy-db-pass-kJ8xcp"
  vars:
    cluster_name: "doggy-app-eks-cluster-0"
    nodegroup_name: "doggy-app-eks-ng-monitoring"
    region: "us-east-1"
    config_dir: "/home/ec2-user/config"
    arch_dir: "/home/ec2-user/kubernetesArchitecture/kubernetes"


#######################################################################
  tasks:

    - name: set up environment 
      block: 
        - name: Ensure /home/ec2-user/config directory exists
          file:
            path: "/home/ec2-user/config"
            state: directory
            mode: '0755'

# this should be done with AWS Module 
        - name: Update kubeconfig
          shell: aws eks update-kubeconfig --region {{ region }} --name {{ cluster_name }}

# is there an eks module 
        - name: Associate IAM OIDC provider
          shell: eksctl utils associate-iam-oidc-provider --cluster {{ cluster_name }} --approve

#AWS Module 
        - name: Get OIDC URL
          shell: |
            aws eks describe-cluster \
              --name {{ cluster_name }} \
              --query "cluster.identity.oidc.issuer" \
              --output text | sed 's|https://||'
          register: oidc_url

        - name: Create ingress namespace
          kubernetes.core.k8s:
            name: ingress-nginx
            api_version: v1
            kind: Namespace
            state: present

        - name: Create monitoring namespace
          kubernetes.core.k8s:
            name: monitoring
            api_version: v1
            kind: Namespace
            state: present

        - name: Apply ingress 
          shell: kubectl apply -k "{{ arch_dir }}/ingress/"
          # async: 300 
          # poll: 0 
          register: deploying_ingress 
          retries: 5
          delay: 10
          until: deploying_ingress.rc == 0


#########################################################################
############# Template CloudFormation First Batch ########################

    - name: Create the CloudFormation templates 
      block: 
        - name: Render the autoscaler role YAML
          shell: |
            envsubst < "{{ arch_dir }}/autoscaler/cf-autoscaler-role.yaml" > "{{ config_dir }}/cf-autoscaler-role-up.yaml"
          environment:
            OIDC_URL: "{{ oidc_url.stdout }}"
            AWS_ID: "{{ aws_id }}"

        - name: Render the SNS stack yaml
          shell: |
            envsubst < "{{ arch_dir }}/monitoring/alerting/cf-sns.yaml" > "{{ config_dir }}/cf-sns-up.yaml"
          environment:
            EMAIL: "{{ email }}"

        - name: Render the EBS CSI role YAML
          shell: |
            envsubst < "{{ arch_dir }}/default/cf-ebs-csi-role.yaml" > "{{ config_dir }}/cf-ebs-csi-role-up.yaml"
          environment:
            OIDC_URL: "{{ oidc_url.stdout }}"
            AWS_ID: "{{ aws_id }}"




#########################################################################
############# Deploy CloudFormation First Batch ########################

    - name: Deploy the Autoscaler role and SNS 
      block: 

        - name: Deploy autoscaler role with CloudFormation
          amazon.aws.cloudformation:
            stack_name: cluster-autoscaler-iam-role
            template_body: "{{ lookup('file', config_dir + '/cf-autoscaler-role-up.yaml') }}"
            state: present
            capabilities:
              - CAPABILITY_NAMED_IAM
          register: deploying_autoscaler_stack
          async: 300 
          poll: 0 

        - name: Set autoscaler stack job ID if async used
          set_fact:
            autoscaler_stack_job_id: "{{ deploying_autoscaler_stack.ansible_job_id | default('') }}"


# Use AWS Module 
        - name: Deploy SNS 
          amazon.aws.cloudformation:
            stack_name: sns-doggy
            template_body: "{{ lookup('file', config_dir + '/cf-sns-up.yaml') }}"
            state: present
          register: deploying_sns_stack
          async: 300 
          poll: 0 

        - name: Set SNS stack job ID if async used
          set_fact:
            sns_stack_job_id: "{{ deploying_sns_stack.ansible_job_id | default('') }}"

        - name: Deploy EBS CSI driver IAM role with CloudFormation
          amazon.aws.cloudformation:
            stack_name: ebs-csi-driver-iam-role
            template_body: "{{ lookup('file', config_dir + '/cf-ebs-csi-role-up.yaml') }}"
            state: present
            capabilities:
              - CAPABILITY_NAMED_IAM
          register: deploying_ebs_csi_stack
          async: 300
          poll: 0

        - name: Set EBS CSI stack job ID if async used
          set_fact:
            ebs_csi_stack_job_id: "{{ deploying_ebs_csi_stack.ansible_job_id | default('') }}"


##########################################################
########### INSTALL REPOSITORIES ########################


    - name: Install Repos 
      block: 
        - name: Add autoscaler Helm repo
          kubernetes.core.helm_repository:
            name: autoscaler
            repo_url: https://kubernetes.github.io/autoscaler
          register: installing_autoscaler_repo

# Do i need helm_repository to do this? 
        - name: Add Prometheus Helm repo
          kubernetes.core.helm_repository:
            name: prometheus-community
            repo_url: https://prometheus-community.github.io/helm-charts
          register: installing_prometheus_repo

# do i need helm_repository to do this 
        - name: Add Grafana Helm repo
          kubernetes.core.helm_repository:
            name: grafana
            repo_url: https://grafana.github.io/helm-charts
          register: installing_grafana_repo


###############################################################
############### INSTALL STACK ################################

    - name: Deploy Repos 
      block: 

        - name: Deploy Prometheus stack
          kubernetes.core.helm:
            name: kube-prometheus-stack
            chart_ref: prometheus-community/kube-prometheus-stack
            release_namespace: monitoring
            create_namespace: true
            values_files:
              - "{{ arch_dir }}/monitoring/prometheus/prometheus-values.yaml"
          register: deploying_prometheus 


        - name: deploying Loki stack
          kubernetes.core.helm:
            name: loki
            chart_ref: grafana/loki
            release_namespace: monitoring
            create_namespace: true
            values_files:
              - "{{ arch_dir }}/monitoring/loki/loki-values.yaml"
          register: deploying_loki

        - name: Deploying Promtail stack
          kubernetes.core.helm:
            name: promtail
            chart_ref: grafana/promtail
            release_namespace: monitoring
            create_namespace: true
            values_files:
              - "{{ arch_dir }}/monitoring/promtail/promtail-values.yaml"
          register: deploying_promtail



############## WAIT #########################################

    - name: Wait for deployment 
      block:

        - name: Wait for autoscaler role to deploy
          async_status:
            jid: "{{ autoscaler_stack_job_id }}"
          register: deploying_autoscaler_stack_status
          until: deploying_autoscaler_stack_status.finished
          retries: 60
          delay: 5 
          when: autoscaler_stack_job_id != ''

        - name: Wait for sns to deploy ######
          async_status:
            jid: "{{ sns_stack_job_id }}"
          register: deploying_sns_stack_status
          until: deploying_sns_stack_status.finished
          retries: 60
          delay: 5
          when: sns_stack_job_id != ''


#########################################################################
############# Template CloudFormation Second Batch ########################

    - name: Create the second batch of templates 
      block: 

        - name: Get autoscaler role ARN
          shell: |
            aws cloudformation describe-stacks \
              --stack-name cluster-autoscaler-iam-role \
              --query "Stacks[0].Outputs[?OutputKey=='ClusterAutoscalerRoleArn'].OutputValue" \
              --output text
          register: autoscaler_role_arn

        - name: Template the autoscaler values
          template:
            src: "{{ arch_dir }}/autoscaler/autoscaler-values.yaml.j2"
            dest: "{{ config_dir }}/autoscaler-values-up.yaml"
          register: autoscaler_template


        - name: Return SNS ARN 
          shell: |
            aws cloudformation describe-stacks --stack-name sns-doggy --query "Stacks[0].Outputs[?OutputKey=='SNSTopicArn'].OutputValue" --output text
          register: sns_topic_arn

        - name: Subscribe email to SNS topic if not already subscribed
          shell: |
            EXISTING_SUBS=$(aws sns list-subscriptions-by-topic --topic-arn "{{ sns_topic_arn.stdout }}" | grep -c "{{ email }}")
            if [ "$EXISTING_SUBS" -eq 0 ]; then
              aws sns subscribe \
                --topic-arn "{{ sns_topic_arn.stdout }}" \
                --protocol email \
                --notification-endpoint "{{ email }}"
            fi
          environment:
            AWS_REGION: us-east-1

        - name: Render alert hook role yaml 
          shell: |
            envsubst < "{{ arch_dir }}/monitoring/alerting/cf-alert-hook-role.yaml" > "{{ config_dir }}/cf-alert-hook-role-up.yaml"
          environment: 
            AWS_ID: "{{ aws_id }}"
            OIDC_URL: "{{ oidc_url.stdout }}"
            OPENAI_SECRET_ARN: "{{ openai_secret_arn }}"
            SNS_TOPIC_ARN: "{{ sns_topic_arn.stdout }}"

#########################################################################
############# Deploy Second Batch ########################

    - name: Deploy the autoscaler and the alert-role
      block:  

        - name: Install cluster autoscaler via Helm
          kubernetes.core.helm:
            name: cluster-autoscaler
            chart_ref: autoscaler/cluster-autoscaler
            release_namespace: kube-system
            create_namespace: true
            values_files:
              - "{{ config_dir }}/autoscaler-values-up.yaml"
            state: present

        - name:  Deploy alert hook IAM role
          amazon.aws.cloudformation:
            stack_name: alert-hook-iam-role
            template_body: "{{ lookup('file', config_dir + '/cf-alert-hook-role-up.yaml') }}"
            state: present
            capabilities:
              - CAPABILITY_NAMED_IAM
          register: deploying_alert_stack


    - name: Deploy the alert hook
      block:  
        - name: Apply Loki alert rules
          shell: kubectl apply -f "{{ arch_dir }}/monitoring/loki/loki-alert-rules.yaml" -n monitoring

        - name: Get alert hook role ARN
          shell: |
            aws cloudformation describe-stacks \
              --stack-name alert-hook-iam-role \
              --query "Stacks[0].Outputs[?OutputKey=='ClusterAlerterRoleArn'].OutputValue" \
              --output text
          register: alerter_role_arn

        - name: Render alert service account
          template:
            src: "{{ arch_dir }}/monitoring/alerting/alert-service-account.yaml.j2"
            dest: "{{ config_dir }}/alert-service-account-up.yaml"

        - name: Apply alert service account
          kubernetes.core.k8s:
            state: present
            src: "{{ config_dir }}/alert-service-account-up.yaml"
            apply: True 

        - name: Render alert pod config 
          template:
            src: "{{ arch_dir }}/monitoring/alerting/alert-pod.yaml.j2"
            dest: "{{ config_dir }}/alert-pod-up.yaml"


 #################################################################
 ######################### POSTGRES SECRET ##################################

    - name: Create Postgres Kubernetes secret from AWS Secrets Manager
      block:
        - name: Fetch postgres password from Secrets Manager
          shell: |
            aws secretsmanager get-secret-value \
              --secret-id "{{ postgres_secret_arn }}" \
              --query SecretString \
              --output text | python3 -c "import sys,json; print(list(json.load(sys.stdin).values())[0])"
          register: postgres_password

        - name: Apply postgres secret to cluster
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: postgres-secret
                namespace: default
              type: Opaque
              stringData:
                POSTGRES_DB: doggyapp
                POSTGRES_USER: doggyapp
                POSTGRES_PASSWORD: "{{ postgres_password.stdout }}"
                DB_URL: jdbc:postgresql://postgres-service:5432/doggyapp

        - name: Wait for EBS CSI driver IAM role stack to be deployed
          async_status:
            jid: "{{ ebs_csi_stack_job_id }}"
          register: deploying_ebs_csi_stack_status
          until: deploying_ebs_csi_stack_status.finished
          retries: 60
          delay: 5
          when: ebs_csi_stack_job_id != ''

        - name: Get EBS CSI driver role ARN
          amazon.aws.cloudformation_info:
            stack_name: ebs-csi-driver-iam-role
          register: ebs_csi_stack_info

        - name: Set EBS CSI role ARN fact
          set_fact:
            ebs_csi_role_arn: "{{ ebs_csi_stack_info.cloudformation['ebs-csi-driver-iam-role'].stack_outputs.EbsCsiDriverRoleArn }}"

        - name: Install EBS CSI driver addon
          shell: |
            aws eks create-addon \
              --cluster-name {{ cluster_name }} \
              --addon-name aws-ebs-csi-driver \
              --service-account-role-arn {{ ebs_csi_role_arn }} \
              --region {{ region }} 2>&1 | grep -v "already exists" || true

        - name: Wait for EBS CSI driver addon to be active
          shell: |
            aws eks describe-addon \
              --cluster-name {{ cluster_name }} \
              --addon-name aws-ebs-csi-driver \
              --region {{ region }} \
              --query "addon.status" \
              --output text
          register: ebs_csi_addon_status
          until: ebs_csi_addon_status.stdout | trim == "ACTIVE"
          retries: 30
          delay: 10

        - name: Create CSI-backed gp2 storage class
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: storage.k8s.io/v1
              kind: StorageClass
              metadata:
                name: gp2
                annotations:
                  storageclass.kubernetes.io/is-default-class: "true"
              provisioner: ebs.csi.aws.com
              volumeBindingMode: WaitForFirstConsumer
              reclaimPolicy: Delete
              parameters:
                type: gp2

        - name: Deploy postgres
          kubernetes.core.k8s:
            state: present
            src: "{{ arch_dir }}/default/postgres.yaml"
            apply: true

 #################################################################
 ######################### DEPLOY PODS ##################################

    - name: Deploy alerter pod
      block:
        - name: Wait for ingress to become available
          kubernetes.core.k8s_info:
            api_version: networking.k8s.io/v1
            kind: Ingress
            namespace: default
            name: frontend-ingress
          register: ingress_status
          until: ingress_status.resources | length > 0
          retries: 30
          delay: 5

        - name: Get LoadBalancer hostname
          shell: |
            kubectl get ingress frontend-ingress -n default -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
          register: lb_host

        - name: Get hosted zone ID for doggyapp.click
          shell: |
            aws route53 list-hosted-zones-by-name \
              --dns-name doggyapp.click \
              --query "HostedZones[0].Id" \
              --output text | cut -d'/' -f3
          register: hosted_zone_id

        - name: Deploy DNS records CloudFormation stack
          amazon.aws.cloudformation:
            stack_name: doggy-dns-tls
            template_body: "{{ lookup('file', arch_dir + '/ingress/cf-dns-tls.yaml') }}"
            template_parameters:
              NlbHostname: "{{ lb_host.stdout }}"
              HostedZoneId: "{{ hosted_zone_id.stdout | trim }}"
            state: present
          register: dns_tls_stack

        - name: Create loadbalancer-config configmap
          shell: |
            kubectl create configmap loadbalancer-config \
              --from-literal=LOAD_BALANCER_URL=https://doggyapp.click \
              --namespace={{ item }} \
              --dry-run=client -o yaml | kubectl apply -f -
          loop:
            - default
            - monitoring

        - name: Create webhook
          kubernetes.core.k8s:
            state: present
            src: "{{ config_dir }}/alert-pod-up.yaml"
            apply: True

    - name: Write environment info file to bastion home directory
      block:
        - name: Get Grafana admin password
          shell: |
            kubectl get secret kube-prometheus-stack-grafana \
              -n monitoring \
              -o jsonpath="{.data.admin-password}" | base64 --decode
          register: grafana_password_raw

        - name: Get GitLab username
          uri:
            url: "{{ gl_url }}/api/v4/user"
            method: GET
            headers:
              PRIVATE-TOKEN: "{{ gl_token }}"
          register: gitlab_user_info

        - name: Write environment info file
          copy:
            dest: /home/ec2-user/environment-info.txt
            content: |
              gitlab username     : {{ gitlab_user_info.json.username }}
              gitlab temp password : {{ gitlab_temp_password }}
              gitlab URL          : http://{{ gitlab_alb_url }}
              Web app URL         : https://doggyapp.click
              Grafana User name   : admin
              Grafana Password    : {{ grafana_password_raw.stdout }}
            mode: '0600'
...
